navsat_transform:
  ros__parameters:
   frequency: 30.0
   delay: 3.0
   zero_altitude: true
   publish_filtered_gps: true # it converts from robot world frame to GPS local coordinates
   use_odometry_yaw: true 
    # Use IMU yaw (typical). If you want yaw from your EKF odometry instead, set true. 
   broadcast_cartesian_transform: true
   magnetic_declination_radians: 0.0558505 # has been calculated based on NOAA according to SAMRT CENTER coordinates
   yaw_offset: 0.0
   wait_for_datum: false
