      pose_target_frame: 'base_link'
      orientation_dimensions: ['yaw']
      #orientation_diagonal [0.1]
      independent: True

    gps_sensor:
      topic: '/odometry/gps'  # Your GPS topic
      # pose_target_frame: 'map'     #twist vs pose for target_frame
      position_dimensions: ['x', 'y']
      independent: True

    publishers:
      filtered_publisher:
        type: fuse_models::Odometry2DPublisher

    filtered_publisher:
      topic: 'odometry/fuse_tier2'
      base_link_frame_id: 'base_link'
      base_link_output_frame_id: 'base_link'
      odom_frame_id: 'odom'
      map_frame_id: 'map'
      world_frame_id: 'map'
      publish_frequency: 30.0
      publish_tf: true
